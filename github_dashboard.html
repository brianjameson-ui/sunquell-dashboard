<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Control Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .task { margin-bottom: 10px; }
        button { margin-left: 5px; }
    </style>
</head>
<body>
    <h1>Mission Control Dashboard</h1>
    <div id="tasks">
        <h2>Your Tasks</h2>
        <div class="task">
            <strong>Follow up with Peter Mammone</strong>
            <button onclick="markDone('Peter')">✅ Mark as Done</button>
            <button onclick="approve('Peter')">➡️ Approve Action</button>
        </div>
        <div class="task">
            <strong>Send follow-up email to Dan Skrobot</strong>
            <button onclick="markDone('Dan')">✅ Mark as Done</button>
            <button onclick="approve('Dan')">➡️ Approve Action</button>
        </div>
        <div class="task">
            <strong>Call Shawn And</strong>
            <button onclick="markDone('Shawn')">✅ Mark as Done</button>
            <button onclick="approve('Shawn')">➡️ Approve Action</button>
        </div>
    </div>

    <script>
        function markDone(taskName) {
            alert('Task ' + taskName + ' marked as done!');
            // Here you could implement storage updates if needed
        }
        function approve(taskName) {
            alert('Task ' + taskName + ' approved!');
            // Here you could implement further actions if needed
        }
    </script>
</body>
</html>
